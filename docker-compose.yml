services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    command: npm run dev -w @e-clat/api
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/eclat
      JWT_SECRET: local-dev-only
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      LOG_LEVEL: debug
      DOCUMENT_PROCESSOR: aws-textract
      STORAGE_ACCOUNT_NAME: devstoreaccount1
      STORAGE_BLOB_ENDPOINT: http://azurite:10000/devstoreaccount1
      DOCUMENTS_CONTAINER_NAME: documents
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    depends_on:
      - postgres
      - azurite

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: eclat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: azurite --blobHost 0.0.0.0 --blobPort 10000
    ports:
      - "10000:10000"

  web:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev -w @e-clat/web -- --host 0.0.0.0"
    environment:
      VITE_PORT: 5173
      VITE_API_URL: http://api:3000
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - .:/workspace
      - web_modules:/workspace/node_modules
    depends_on:
      - api

volumes:
  postgres-data:
  node_modules:
  web_modules:
