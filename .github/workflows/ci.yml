name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build shared package
        run: npm run build -w @e-clat/shared
      - name: Typecheck API
        run: npm run typecheck -w @e-clat/api
      - name: Typecheck Web
        run: npm run typecheck -w @e-clat/web

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: eclat_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/eclat_test
      JWT_SECRET: ci-test-only
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build shared package
        run: npm run build -w @e-clat/shared
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: data
      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: data
      - name: Seed test data
        run: npx prisma db seed
        working-directory: data
      - name: Run API tests
        run: npx vitest run

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build shared package
        run: npm run build -w @e-clat/shared
      - name: Run web tests
        run: npm run test -w @e-clat/web

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build shared
        run: npm run build -w @e-clat/shared
      - name: Build API
        run: npm run build -w @e-clat/api
      - name: Build Web
        run: npm run build -w @e-clat/web

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    steps:
      - uses: actions/checkout@v6
      - name: Build API container
        run: docker build --target runtime -t e-clat-api:ci-${{ github.sha }} -f apps/api/Dockerfile .
